name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: hatch
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: hatch
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            binary: hatch
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: hatch
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: hatch.exe
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64-linux only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          STAGED="hatch-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} "$STAGED"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: hatch-${{ matrix.target }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-binaries/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-binaries
          sha256sum hatch-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Attach binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-binaries/*
          generate_release_notes: true
